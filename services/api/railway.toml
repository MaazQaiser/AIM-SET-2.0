# @dc-copilot/api — must use Docker, not Railpack/pnpm (see docs/API_DEPLOYMENT.md)
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"
watchPatterns = ["services/api/**", "python-packages/**", "prompts/**", "Dockerfile.api"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
numReplicas = 1
# Do not set startCommand — the Docker image CMD runs uvicorn
