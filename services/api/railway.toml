# Railway monorepo service @dc-copilot/api — build from repo root (see docs/API_DEPLOYMENT.md)
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"
watchPatterns = ["services/api/**", "python-packages/**", "prompts/**", "Dockerfile.api"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
numReplicas = 1
