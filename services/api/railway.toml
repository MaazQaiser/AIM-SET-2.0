# @dc-copilot/api — must use Docker, not Railpack/pnpm (see docs/API_DEPLOYMENT.md)
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"
watchPatterns = ["services/api/**", "python-packages/**", "prompts/**", "Dockerfile.api"]

[deploy]
startCommand = "sh -c 'exec uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
numReplicas = 1
